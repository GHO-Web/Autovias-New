      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es la promoción Viajero Anticipado de ETN Turistar?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Es una tarifa preferencial para quienes compran boletos con anticipación, disponible en web, app, taquillas y centro telefónico, con descuentos exclusivos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Dónde puedo comprar boletos con tarifa Viajero Anticipado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Puedes adquirirlos en la app ETN, sitio web oficial, taquillas ETN, puntos de venta propios y centro de contacto telefónico. No aplica en canales externos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué días aplica el descuento adicional por Viajero Anticipado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El descuento adicional aplica para viajes programados martes, miércoles y jueves, sujeto a disponibilidad."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué requisitos debo cumplir para usar la tarifa Viajero Anticipado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Debes presentar una identificación oficial al abordar. La tarifa es personal e intransferible y no aplica para boletos abiertos ni con otros descuentos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo cambiar mi boleto con tarifa Viajero Anticipado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, puedes modificar fecha y hora hasta dos veces. No se permite cambio de nombre y deberás pagar la diferencia si la nueva tarifa es mayor."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué pasa si pierdo mi salida programada?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Si llegas a la terminal dentro de los 30 minutos posteriores a tu hora de salida, puedes ser reubicado sin costo en la próxima salida disponible."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué formas de pago se aceptan para Viajero Anticipado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Se aceptan todas las formas de pago disponibles en taquillas y sitio web, incluyendo tarjetas, efectivo, PayCash, KueskiPay y pagos referenciados en OXXO."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo cancelar un boleto con tarifa Viajero Anticipado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No, esta tarifa no permite cancelaciones ni devoluciones bajo ninguna circunstancia."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué pasa si no realizo el pago referenciado a tiempo?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Si no realizas el pago dentro de las 24 horas, la reservación se cancela automáticamente y el asiento se libera para su venta."
            }
          },
          {
            "@type": "Question",
            "name": "¿Dónde puedo consultar disponibilidad y rutas vigentes?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Puedes consultar disponibilidad y rutas vigentes en www.etn.com.mx, la App ETN o directamente en taquillas."
            }
          }
        ]
